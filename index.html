<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    canvas { display: block; touch-action: none; }

    /* ── Orientation overlay (mobile only) ──────────────────────────────────── */
    #orient-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    /* ── Portrait prompt ──────────────────────────────────────────────────────── */
    #portrait-prompt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .phone-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    /* Portrait phone shape */
    .ph-portrait {
      width: 32px; height: 54px;
      border: 3px solid #fff;
      border-radius: 7px;
      position: relative;
      flex-shrink: 0;
    }
    .ph-portrait::before {
      content: '';
      position: absolute;
      top: 5px; left: 50%; transform: translateX(-50%);
      width: 9px; height: 3px;
      background: #fff; border-radius: 2px;
    }
    .ph-portrait::after {
      content: '';
      position: absolute;
      bottom: 5px; left: 50%; transform: translateX(-50%);
      width: 7px; height: 7px;
      border: 2px solid #fff; border-radius: 50%;
    }
    /* Arrow */
    .ph-arrow {
      animation: arrow-nudge 1.6s ease-in-out infinite;
    }
    .ph-arrow svg { width: 24px; height: 24px; fill: #fff; display: block; }
    @keyframes arrow-nudge {
      0%, 100% { transform: translateX(0); opacity: 1; }
      50%       { transform: translateX(5px); opacity: 0.5; }
    }
    /* Landscape phone shape */
    .ph-landscape {
      width: 54px; height: 32px;
      border: 3px solid #fff;
      border-radius: 7px;
      position: relative;
      flex-shrink: 0;
    }
    .ph-landscape::before {
      content: '';
      position: absolute;
      left: 5px; top: 50%; transform: translateY(-50%);
      width: 3px; height: 9px;
      background: #fff; border-radius: 2px;
    }
    .ph-landscape::after {
      content: '';
      position: absolute;
      right: 5px; top: 50%; transform: translateY(-50%);
      width: 7px; height: 7px;
      border: 2px solid #fff; border-radius: 50%;
    }
    #portrait-prompt h2 {
      color: #fff;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-align: center;
    }
    #portrait-prompt p {
      color: #888;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-align: center;
    }

    /* ── Landscape ready prompt ───────────────────────────────────────────────── */
    #landscape-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #landscape-prompt p {
      color: #888;
      font-family: monospace;
      font-size: 13px;
      letter-spacing: 0.08em;
    }
    #btn-start-game {
      padding: 14px 52px;
      background: transparent;
      border: 2px solid #fff;
      border-radius: 4px;
      color: #fff;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.12em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    #btn-start-game:active { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <!-- Mobile orientation overlay -->
  <div id="orient-overlay">
    <!-- Shown in portrait: rotate instruction -->
    <div id="portrait-prompt">
      <div class="phone-row">
        <div class="ph-portrait"></div>
        <div class="ph-arrow">
          <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </div>
        <div class="ph-landscape"></div>
      </div>
      <h2>ROTATE TO PLAY</h2>
      <p>This game requires landscape mode</p>
    </div>
    <!-- Shown once landscape is detected: tap to start -->
    <div id="landscape-prompt">
      <p>GOOD TO GO</p>
      <button id="btn-start-game">TAP TO START</button>
    </div>
  </div>

  <script>
    (function () {
      var overlay         = document.getElementById('orient-overlay');
      var portraitPrompt  = document.getElementById('portrait-prompt');
      var landscapePrompt = document.getElementById('landscape-prompt');
      var startBtn        = document.getElementById('btn-start-game');
      var phaserLoaded    = false;

      function isMobile() {
        return /Mobi|Android|iPhone|iPad|iPod|Touch/i.test(navigator.userAgent)
          || (navigator.maxTouchPoints > 1);
      }

      function isPortrait() {
        if (window.screen && window.screen.orientation && window.screen.orientation.type) {
          return window.screen.orientation.type.indexOf('portrait') !== -1;
        }
        return window.innerHeight > window.innerWidth;
      }

      function loadPhaser() {
        if (phaserLoaded) return;
        phaserLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js';
        s.onload = function () {
          var m = document.createElement('script');
          m.type = 'module';
          m.src = 'src/main.js';
          document.body.appendChild(m);
        };
        document.body.appendChild(s);
      }

      // Non-mobile: load immediately
      if (!isMobile()) {
        loadPhaser();
        return;
      }

      // Mobile, already landscape on load: load immediately, no overlay
      if (!isPortrait()) {
        overlay.style.display = 'none';
        loadPhaser();
        return;
      }

      // Mobile, portrait on load: show overlay, defer Phaser until tap
      var startedFromPortrait = true;
      overlay.style.display = 'flex';
      portraitPrompt.style.display = 'flex';
      landscapePrompt.style.display = 'none';

      function onOrientationChange() {
        setTimeout(function () {
          if (!isPortrait() && startedFromPortrait) {
            overlay.style.display = 'flex';
            portraitPrompt.style.display = 'none';
            landscapePrompt.style.display = 'flex';
          } else if (isPortrait()) {
            overlay.style.display = 'flex';
            portraitPrompt.style.display = 'flex';
            landscapePrompt.style.display = 'none';
          }
        }, 150);
      }

      // TAP TO START: load Phaser now (correct landscape dims) then hide overlay
      startBtn.addEventListener('click', function () {
        overlay.style.display = 'none';
        loadPhaser();
      });

      window.addEventListener('resize', onOrientationChange);
      window.addEventListener('orientationchange', onOrientationChange);
    })();
  </script>
</body>
</html>
